<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 QUESTION ? 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .floating {
            position: absolute;
            font-size: 3.5rem;
            animation: floatUp 7s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-120px) rotate(35deg); }
        }

        .container { text-align: center; z-index: 10; max-width: 90%; }

        h1 {
            font-size: 2.6rem;
            color: #ff3366;
            margin-bottom: 2rem;
            text-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .buttons { position: relative; height: 180px; margin: 30px 0; }

        button {
            padding: 18px 42px;
            font-size: 1.45rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        #yesBtn { background: #ff3366; color: white; }
        #yesBtn:hover { transform: scale(1.12); }

        #noBtn {
            background: #666;
            color: white;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -20%);
        }

        .message { margin-top: 20px; font-size: 1.55rem; color: #ff3366; min-height: 80px; font-weight: 600; }

        /* FINAL CUTE CAT PAGE */
        .final {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff3366, #ff8ec4);
            z-index: 100;
            color: white;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .cats-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .cat {
            font-size: 6.5rem;
            animation: bounce 2s infinite alternate;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }

        .flower {
            font-size: 3rem;
            animation: spin 8s linear infinite;
        }

        .final h2 {
            font-size: 2.8rem;
            margin: 20px 0;
            text-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="bg-elements" id="bgElements"></div>

    <div class="container">
        <h1>Do you love me like I love you? 💕</h1>
        
        <div class="buttons">
            <button id="yesBtn">YES 💖</button>
            <button id="noBtn">NO 😢</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>

    <!-- CUTE CAT FINAL PAGE -->
    <div class="final" id="finalScreen">
        <h2>Finally! You're mine now 💕</h2>
        
        <div class="cats-container">
            <div>
                <div class="cat">🐱</div>
                <p style="margin:5px 0 0; font-size:1.3rem;">Boy Cat (Me)</p>
            </div>
            <div style="font-size:4rem; margin-top:30px;">💕</div>
            <div>
                <div class="cat" style="transform: scaleX(-1);">🐱</div>
                <p style="margin:5px 0 0; font-size:1.3rem;">Girl Cat (You)</p>
            </div>
        </div>

        <div style="font-size:4rem; margin:20px 0;">🌸🌺🌷🌹</div>
        
        <p style="font-size:1.8rem; margin-top:20px;">We look so cute together ❤️</p>
        
        <button onclick="location.reload()" style="margin-top:30px; padding:15px 35px; font-size:1.3rem; background:white; color:#ff3366; border:none; border-radius:50px;">
            Play Again 💌
        </button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const messageEl = document.getElementById('message');
        const finalScreen = document.getElementById('finalScreen');
        const bg = document.getElementById('bgElements');

        let noClickCount = 0;

        const funnyMessages = ["Wrong choice babe 😏", "Naahhh...", "Your husband disagrees 👀", "Nope! Try again", "My love doesn't accept No 💔"];

        function createFloating() {
            const item = document.createElement('div');
            item.classList.add('floating');
            item.textContent = ['💖','🌸','💗','🌺','🦋','💘'][Math.floor(Math.random()*6)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (5 + Math.random() * 6) + 's';
            bg.appendChild(item);
            setTimeout(() => item.remove(), 15000);
        }

        setInterval(createFloating, 280);

        function moveNoSlightly() {
            const randomX = (Math.random() * 130) - 65;
            const randomY = (Math.random() * 55) - 25;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        noBtn.addEventListener('click', () => {
            noClickCount++;
            moveNoSlightly();
            if (noClickCount <= 5) {
                messageEl.textContent = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            }
            if (noClickCount >= 5) {
                messageEl.innerHTML = `<strong>No button is no more 😌<br>Please press YES now 💕</strong>`;
                noBtn.style.opacity = "0.25";
                noBtn.style.pointerEvents = "none";
            }
        });

        yesBtn.addEventListener('click', () => {
            finalScreen.style.display = "flex";
            for (let i = 0; i < 25; i++) {
                setTimeout(createFloating, i * 80);
            }
        });

        window.addEventListener('load', () => {
            noBtn.style.position = 'absolute';
            for (let i = 0; i < 12; i++) setTimeout(createFloating, i * 100);
        });
    </script>
</body>
</html>
